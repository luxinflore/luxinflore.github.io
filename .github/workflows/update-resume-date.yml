name: Update resume date

on:
  push:
    branches: [master]
    paths:
      - assets/resume.pdf

permissions:
  contents: write

jobs:
  update-resume-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare resume PDF and date
        run: |
          python3 -m pip install --quiet pypdf
          python3 scripts/set-resume-pdf-metadata.py
          mkdir -p _data
          DATE=$(git log -1 --format=%cd --date=format:'%B %-d, %Y' -- assets/resume.pdf)
          printf 'last_updated: "%s"\n' "$DATE" > _data/resume.yml

      - name: Commit resume updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update resume metadata and last updated date
          file_pattern: _data/resume.yml assets/resume.pdf
